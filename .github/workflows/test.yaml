name: Test doorpix

on:
  push:
    branches:
      - main
      - doorpix/v2
  pull_request:
    branches: 
      - main
      - doorpix/v2

jobs:
  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run mod tidy
        run: go mod tidy
      - name: Run mod vendor
        run: go mod vendor
      - name: Check diff
        run: git diff --quiet

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - run: nix flake check
