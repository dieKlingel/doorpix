name: Test doorpix

on:
  push:
    branches:
      - main
      - doorpix/v2
  pull_request:
    branches: 
      - main
      - doorpix/v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - run: nix flake check
