name: Test doorpix

on:
  push:
    branches:
      - main
      - doorpix/v2
  pull_request:
    branches: 
      - main
      - doorpix/v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test -v ./...
