name: Containerize doorpix

on:
  workflow_dispatch:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
    branches: 
      - main

permissions:
  contents: read
  packages: write

jobs:
  containerize:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    runs-on: ${{ case(matrix.arch == 'arm64', 'ubuntu-24.04-arm', 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_type == 'tag' }}
          tags: ghcr.io/dieklingel/doorpix:${{ github.sha }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  create-manifests:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - containerize
    steps: 
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - name: Generate image metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dieklingel/doorpix
          tags: |
            type=semver,pattern={{version}}
      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create version manifest and push
        run: |
          docker manifest create ${{ steps.meta.outputs.tags }} \
            --amend ghcr.io/ghcr.io/dieklingel/doorpix:${{ github.sha }}-amd64 \
            --amend ghcr.io/ghcr.io/dieklingel/doorpix:${{ github.sha }}-arm64
          docker manifest push ${{ steps.meta.outputs.tags }}
