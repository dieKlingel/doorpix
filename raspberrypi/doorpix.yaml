sip: 
  enabled: false
  username: '{{ .DOORPIX_SIP_USERNAME }}'
  password: '{{ .DOORPIX_SIP_PASSWORD }}'
  realm: '{{ .DOORPIX_SIP_REALM }}'
  whitelist: []

http:
  enabled: true
  port: '{{ or .DOORPIX_HTTP_PORT "8080" }}'

camera:
  device: '{{ or .DOORPIX_CAMERA_DEVICE "autovideosrc" }}'

gpio:
  enabled: false
  debounce-time: 50ms
  chip: /dev/gpiochip0
  inputs:
    - 14 # The GPIO/BCM Pin 14, physical pin 8: https://pinout.xyz/pinout/pin8_gpio14/

events:
  - event: system/doorpix/gpio/14/rising
    steps:
      - type: shell
        with:
          cmd: |
            gst-launch-1.0 playbin uri=file:///var/doorpix/audio.wav
