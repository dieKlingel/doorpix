


services:
  doorpix:
    image: ghcr.io/dieklingel/doorpix:0.1.0-rc1
    ports:
      - 8080:8080
    volumes:
      - ./doorpix.yaml:/var/doorpix/doorpix.yaml:ro
      - ${XDG_RUNTIME_DIR}/pipewire-0:/run/user/1000/pipewire-0
    group_add:
      - ${VIDEO_GROUP_ID:-44}
      - ${GPIO_GROUP_ID:-986}
    environment:
      XDG_RUNTIME_DIR: /run/user/1000
    devices:
      - /dev/video0:/dev/video0
    env_file:
      - .env
