version: '3'

env:
  PATH:
    sh: echo "$PATH:$(go env GOPATH)/bin"
  REVISION:
    sh: git describe --always

tasks:
  generate:
    desc: Generate the project
    cmds:
      - command -v protoc-gen-go 1>/dev/null || go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - command -v protoc-gen-go-grpc 1>/dev/null || go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - go generate ./...
  check:generate:
    desc: Check if the generated code is in sync
    cmds:
      - task: generate
      - >-
        git diff --quiet || (
          echo "Generated code is out of sync. Please run 'task generate' and commit the changes." &&
          exit 1
        )
  build:
    desc: Build the project
    cmds:
      - go build -o core cmd/main.go
  test:
    desc: Run tests
    cmds:
      - go test ./...
  containerize:
    desc: Build the container image
    cmds:
      - docker buildx build --platform linux/arm64 -t ghcr.io/dieklingel/doorpix/core:$REVISION .
