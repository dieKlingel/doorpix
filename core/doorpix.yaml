on:
  startup:
    - log: hello world at {{.date}} {{.time}} from {{.pwd}}
    - eval:
        - echo "I am a shell command running in $SHELL"
  shutdown:
    - log: goodbye world # prints goodbye world to the console
  api:ring:
    - log: ring ring ring
    - to: '{{ .sip }}'
      message: |-
        Jemand steht vor deiner Tür {{.date}} {{.time}}
        {{- if .message }}
        
        {{ .message }}
        {{- end }}

sip-phone:
  server: sip.linphone.org
  username: example
  password: secret
  realm: sip.linphone.org
  whitelist: []

http:
  port: 8080
