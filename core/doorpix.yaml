# yaml-language-server: $schema=../doorpix.schema.json

tmpls:
  unlock: &unlock
    - log: "running unlock"

on:
  mqtt-message:
    - sleep: 1s
    - log: '{{.topic}}: {{.message}}'
  startup:
    - log: hello world # prints hello world to the console
    - condition: 'true' 
      then: 
        - log: a
      else:
        - log: "unlock failed"
  shutdown:
    - log: goodbye world # prints goodbye world to the console
  api:ring:
    - log: ring ring ring
    - to: '{{ .sip }}'
      message: |-
        Jemand steht vor deiner Tür {{.date}} {{.time}}
        {{- if .message }}
        
        {{ .message }}
        {{- end }}
  rpc:unlock:
    - log: unlock the door
    - condition: '{{.door}} == "main"'
      then:
        - log: unlock the main door
        - to: '{{.core}}'
          message: '{"door": "main", "action": "unlock"}'
      else:
        - log: unlock the back door
        - to: '{{.core}}'
          message: '{"door": "back", "action": "unlock"}'

sip-phone:
  enabled: false
  server: sip.linphone.org
  username: example
  password: secret
  realm: sip.linphone.org
  stun-servers:
    - stun.linphone.org:3478
    - stun.l.google.com:19302

http:
  port: 8080

camera:
  device: videotestsrc pattern=ball
  # e.g. device: v4l2src device=/dev/video0

mqtt:
  enabled: true
  host: broker.hivemq.com
  port: 1883

rpc:
  enabled: true
  host: 0.0.0.0
