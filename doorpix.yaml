
kiosk:
  core: core:50051
  label: 
    title: "Fam. XYZ"
    street:
      name: "XYZ"
      number: "123"
 
on:
  startup:
    - log: hello {{.date}} {{.time}}
  ring:
    - log: 'ring event from {{.source}} at {{.date}} {{.time}} (name: {{.name}}, street.name {{.street_name}}, street.number {{.street_number}})'
    - eval:
        - gst-launch-1.0 -m filesrc location=/etc/doorpix/bell.wav ! wavparse ! autoaudiosink
  shutdown:
    - log: goodbye

sip-phone:
  enabled: false
  server: sip.example.org
  username: user
  password: password
  realm: sip.example.org
  stun-servers:
    - stun.linphone.org:3478
    - stun.l.google.com:19302
  whitelist: []

http:
  port: 8080

camera:
  device: videotestsrc pattern=ball

rpc:
  host: 0.0.0.0
